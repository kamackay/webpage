services:
  web:
    build:
      context: .
      args:
        APP_VERSION: ${APP_VERSION:-dev}
    image: keith-webpage:${APP_VERSION:-dev}
    container_name: keith-webpage
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-8080}:8080"
    environment:
      PORT: "8080"
      GIN_MODE: release
      APP_VERSION: ${APP_VERSION:-dev}
    healthcheck:
      test: ["CMD", "/app/server", "--healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
