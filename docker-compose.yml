services:
  db:
    image: postgres:18
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=pass
      - POSTGRES_DB=db
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
    ports:
      - 5432:5432
    volumes:
      - postgres:/var/lib/postgresql

  web:
    build:
      context: .
      args:
        APP_VERSION: ${APP_VERSION:-dev}
    image: keith-webpage:${APP_VERSION:-dev}
    container_name: keith-webpage
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1"
    ports:
      - "${HOST_PORT:-9999}:9999"
    environment:
      PORT: "9999"
      GIN_MODE: release
      APP_VERSION: ${APP_VERSION:-dev}
      DATABASE_URL: postgresql://user:pass@db:5432/db?sslmode=disable
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
volumes:
  postgres:
