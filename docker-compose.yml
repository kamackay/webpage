services:
  web:
    build:
      context: .
      args:
        APP_VERSION: ${APP_VERSION:-dev}
    image: keith-webpage:${APP_VERSION:-dev}
    container_name: keith-webpage
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-9999}:9999"
    environment:
      PORT: "9999"
      GIN_MODE: release
      APP_VERSION: ${APP_VERSION:-dev}
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
